<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jay OS</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#05070f;
  --glass:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.1);
  --text:rgba(255,255,255,0.9);
  --muted:rgba(255,255,255,0.4);
  --accent:#00ffd5;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:Syne,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* wallpaper */
.wall{
  position:fixed;inset:0;
  background:radial-gradient(circle at 20% 20%,rgba(0,255,213,0.15),transparent 40%),
             radial-gradient(circle at 80% 70%,rgba(120,80,255,0.15),transparent 45%);
  filter:blur(60px);
  z-index:0;
}

/* LOGIN */
#login{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:10;
}
.card{
  width:340px;
  padding:30px;
  border-radius:18px;
  background:var(--glass);
  border:1px solid var(--border);
  backdrop-filter:blur(20px);
  text-align:center;
}
input{
  width:100%;
  margin-top:12px;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  color:white;
}
button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  cursor:pointer;
  font-weight:600;
}

/* OS */
#os{
  display:none;
  height:100vh;
  flex-direction:column;
}

.topbar{
  height:40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px;
  background:rgba(0,0,0,0.3);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
}

.launchpad{
  flex:1;
  display:grid;
  grid-template-columns:repeat(auto-fill,100px);
  gap:18px;
  padding:30px;
}

.app{
  width:100px;height:100px;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
}
.app:hover{transform:scale(1.08);}

.icon{font-size:26px;}
.name{font-size:11px;margin-top:6px;color:var(--muted);}

/* window */
.window{
  position:absolute;
  width:700px;
  height:500px;
  top:80px;left:80px;
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.bar{
  height:34px;
  background:#111;
  color:white;
  display:flex;
  align-items:center;
  padding:0 10px;
  font-size:12px;
}
iframe{width:100%;height:calc(100% - 34px);border:none;}
</style>
</head>

<body>

<div class="wall"></div>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>Jay OS</h2>
    <input id="u" placeholder="username">
    <input id="p" type="password" placeholder="password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- OS -->
<div id="os">
  <div class="topbar">
    <div>🧊 Jay OS</div>
    <button onclick="logout()">logout</button>
  </div>

  <div class="launchpad" id="apps"></div>
</div>

<script>
let USER=null;
let LINKS=[];

async function login(){
  const u=document.getElementById("u").value;
  const p=document.getElementById("p").value;

  const r=await fetch("/api/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:u,password:p})
  });

  const d=await r.json();
  if(d.ok){
    USER=u;
    document.getElementById("login").style.display="none";
    document.getElementById("os").style.display="flex";
    loadLinks();
  }
}

function logout(){
  location.reload();
}

async function loadLinks(){
  const r=await fetch("/api/links");
  LINKS=await r.json();

  const apps=document.getElementById("apps");
  apps.innerHTML="";

  LINKS.forEach(l=>{
    const div=document.createElement("div");
    div.className="app";
    div.innerHTML=`<div class="icon">${l.emoji||"🔗"}</div>
                   <div class="name">${l.name}</div>`;
    div.onclick=()=>openWin(l.url,l.name);
    apps.appendChild(div);
  });
}

function openWin(url,name){
  const w=document.createElement("div");
  w.className="window";
  w.innerHTML=`
    <div class="bar">${name} <button onclick="this.closest('.window').remove()" style="margin-left:auto">x</button></div>
    <iframe src="${url}"></iframe>
  `;
  document.body.appendChild(w);
}
</script>

</body>
</html>
