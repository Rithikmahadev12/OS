<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jay OS</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  font-family:Syne,sans-serif;
  background:#05070f;
  color:white;
  overflow:hidden;
}

.wall{
  position:fixed;inset:0;
  background:radial-gradient(circle at 20% 20%,rgba(0,255,200,0.18),transparent 40%),
             radial-gradient(circle at 80% 80%,rgba(120,80,255,0.18),transparent 40%);
  filter:blur(60px);
}

/* LOGIN */
#auth{
  position:fixed;inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:340px;
  padding:28px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(20px);
  text-align:center;
}

h2{margin:0 0 10px 0;}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
  outline:none;
}

button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#00ffd5,#7c5cff);
  cursor:pointer;
  font-weight:700;
}

small{color:rgba(255,255,255,0.5);display:block;margin-top:8px;}

.err{
  color:#ff6b6b;
  font-size:12px;
  margin-top:8px;
  min-height:16px;
}

/* OS */
#os{
  display:none;
  height:100vh;
}

.topbar{
  height:40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px;
  background:rgba(0,0,0,0.4);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,100px);
  gap:16px;
  padding:30px;
}

.app{
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.2s;
}
.app:hover{transform:scale(1.08);}
.icon{font-size:24px;}
.name{font-size:11px;margin-top:6px;opacity:0.7;}

.modal{
  position:absolute;
  top:80px;left:80px;
  width:700px;height:500px;
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
iframe{width:100%;height:100%;border:none;}
</style>
</head>

<body>

<div class="wall"></div>

<!-- AUTH -->
<div id="auth">
  <div class="card">

    <h2>🧊 Jay OS</h2>

    <input id="user" placeholder="username"/>
    <input id="pass" type="password" placeholder="password"/>

    <div class="err" id="err"></div>

    <button onclick="login()">Login</button>

    <small>Signup uses invite password: "Jay" or "tejushasnoaura"</small>

    <hr style="margin:14px 0;border:1px solid rgba(255,255,255,0.1)">

    <input id="su-user" placeholder="new username"/>
    <input id="su-pass" placeholder="invite password"/>

    <button onclick="signup()">Create Account</button>

  </div>
</div>

<!-- OS -->
<div id="os">
  <div class="topbar">
    <div>🧊 Jay OS</div>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>

let LINKS = [];

async function login(){
  const username = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  const r = await fetch("/api/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  });

  const d = await r.json();

  if(!d.ok){
    document.getElementById("err").textContent = d.error;
    return;
  }

  startOS();
}

async function signup(){
  const username = document.getElementById("su-user").value;
  const password = document.getElementById("su-pass").value;

  const r = await fetch("/api/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  });

  const d = await r.json();

  if(!d.ok){
    document.getElementById("err").textContent = d.error;
    return;
  }

  document.getElementById("err").textContent = "Account created! Now login.";
}

function logout(){
  location.reload();
}

async function startOS(){
  document.getElementById("auth").style.display="none";
  document.getElementById("os").style.display="block";
  loadLinks();
}

async function loadLinks(){
  const r = await fetch("/api/links");
  LINKS = await r.json();

  const grid = document.getElementById("grid");
  grid.innerHTML="";

  LINKS.forEach(l=>{
    const div = document.createElement("div");
    div.className="app";
    div.innerHTML=`
      <div class="icon">${l.emoji}</div>
      <div class="name">${l.name}</div>
    `;
    div.onclick=()=>open(l.url);
    grid.appendChild(div);
  });
}

function open(url){
  const w = document.createElement("div");
  w.className="modal";
  w.innerHTML=`<iframe src="${url}"></iframe>`;
  document.body.appendChild(w);
}

</script>

</body>
</html>
