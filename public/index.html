<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jay OS</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

/* DESKTOP */
.desktop{
  position:relative;
  width:100%;
  height:100%;
}

/* DOCK */
.dock{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
  padding:12px 18px;
  border-radius:20px;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
}

.dock-item{
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:14px;
  cursor:pointer;
  transition:0.2s;
}

.dock-item:hover{
  transform:scale(1.2);
  background:rgba(255,255,255,0.1);
}

/* WINDOW */
.window{
  position:absolute;
  width:500px;
  height:350px;
  top:80px;
  left:100px;

  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;

  backdrop-filter:blur(30px);
  overflow:hidden;
}

.titlebar{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
  cursor:grab;

  background:rgba(255,255,255,0.05);
}

.buttons{
  display:flex;
  gap:6px;
}

.btn{
  width:12px;
  height:12px;
  border-radius:50%;
  cursor:pointer;
}

.close{ background:#ff5f56;}
.min{ background:#ffbd2e;}
.max{ background:#27c93f;}

.window-content{
  padding:15px;
  font-size:14px;
}

.window iframe{
  width:100%;
  height:calc(100% - 40px);
  border:none;
}
</style>
</head>

<body>

<div class="desktop" id="desktop"></div>

<div class="dock">
  <div class="dock-item" onclick="openApp('Google','https://google.com')">🌐</div>
  <div class="dock-item" onclick="openApp('YouTube','https://youtube.com')">▶️</div>
  <div class="dock-item" onclick="openApp('ChatGPT','https://chat.openai.com')">💬</div>
</div>

<script>
let z = 1;

function openApp(name, url){
  const win = document.createElement("div");
  win.className = "window";
  win.style.zIndex = ++z;

  win.innerHTML = `
    <div class="titlebar">
      <div>${name}</div>
      <div class="buttons">
        <div class="btn close"></div>
        <div class="btn min"></div>
        <div class="btn max" onclick="window.open('${url}','_blank')"></div>
      </div>
    </div>
    <iframe src="${url}"></iframe>
  `;

  document.getElementById("desktop").appendChild(win);

  // DRAGGING
  const bar = win.querySelector(".titlebar");
  let offsetX, offsetY, isDown=false;

  bar.addEventListener("mousedown", (e)=>{
    isDown = true;
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
    win.style.zIndex = ++z;
  });

  document.addEventListener("mouseup", ()=> isDown=false);

  document.addEventListener("mousemove", (e)=>{
    if(!isDown) return;
    win.style.left = (e.clientX - offsetX) + "px";
    win.style.top = (e.clientY - offsetY) + "px";
  });

  // CLOSE
  win.querySelector(".close").onclick = ()=> win.remove();
}
</script>

</body>
</html>
