/* =========================
   JAY OS v3 (FULL WEB OS)
   - Taskbar + Windows
   - Draggable apps
   - Persistent user session
   - Backend compatible (Express unchanged)
   ========================= */

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jay OS v3</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at 20% 10%, #1a2b1f, transparent 40%),
              radial-gradient(circle at 80% 80%, #0f1a14, transparent 45%),
              #070a08;
  color:#fff;
}

/* LOGIN */
.screen{
  display:none;
  height:100vh;
  align-items:center;
  justify-content:center;
}
.screen.active{display:flex;}

.card{
  width:340px;
  padding:24px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:#fff;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:rgba(100,170,115,0.8);
  color:#fff;
}

/* DESKTOP */
#desktop{
  display:none;
  height:100vh;
}
#desktop.active{display:block;}

.topbar{
  height:44px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.apps{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,90px);
  gap:12px;
}

.app{
  text-align:center;
  padding:10px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  cursor:pointer;
  transition:0.2s;
}
.app:hover{transform:translateY(-3px);background:rgba(100,170,115,0.2);}

/* TASKBAR */
.taskbar{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  padding:10px;
  border-radius:16px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
}
.taskbtn{
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  cursor:pointer;
  background:rgba(255,255,255,0.08);
}
.taskbtn:hover{background:rgba(100,170,115,0.25);}

/* WINDOW SYSTEM */
.window{
  position:absolute;
  width:420px;
  height:320px;
  background:rgba(20,20,20,0.7);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;
  overflow:hidden;
}

.winbar{
  height:32px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 8px;
  background:rgba(255,255,255,0.06);
  cursor:grab;
}

iframe{
  width:100%;
  height:calc(100% - 32px);
  border:none;
}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="card">
    <h2>Jay OS v3</h2>
    <input id="u" placeholder="username" />
    <input id="p" placeholder="password" type="password" />
    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop">

  <div class="topbar">
    <div>🖥 Jay OS v3</div>
    <div id="user"></div>
  </div>

  <div class="apps" id="apps"></div>

  <div class="taskbar">
    <div class="taskbtn" onclick="loadLinks()">🔄</div>
    <div class="taskbtn" onclick="logout()">⏻</div>
  </div>

</div>

<script>
let currentUser = localStorage.getItem('user');
let links = [];

if(currentUser){
  document.getElementById('login').classList.remove('active');
  document.getElementById('desktop').classList.add('active');
  document.getElementById('user').innerText = currentUser;
  loadLinks();
}

async function login(){
  const r = await fetch('/api/login',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:u.value,password:p.value})
  });
  const d = await r.json();
  if(d.ok){
    localStorage.setItem('user',d.username);
    location.reload();
  }
}

async function signup(){
  const r = await fetch('/api/signup',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:u.value,password:p.value})
  });
  const d = await r.json();
  if(d.ok){
    localStorage.setItem('user',d.username);
    location.reload();
  }
}

async function loadLinks(){
  const r = await fetch('/api/links');
  links = await r.json();
  render();
}

function render(){
  const a = document.getElementById('apps');
  a.innerHTML = '';
  links.forEach(l=>{
    const d = document.createElement('div');
    d.className='app';
    d.innerHTML = `<div>${l.emoji}</div><div style='font-size:11px'>${l.name}</div>`;
    d.onclick = ()=>openWin(l);
    a.appendChild(d);
  });
}

function openWin(app){
  const w = document.createElement('div');
  w.className='window';
  w.style.top='80px';
  w.style.left='80px';

  w.innerHTML = `
    <div class='winbar'>
      <div>${app.name}</div>
      <div>
        <button onclick="window.open('${app.url}','_blank')">↗</button>
        <button onclick="this.closest('.window').remove()">x</button>
      </div>
    </div>
    <iframe src='${app.url}'></iframe>
  `;

  document.body.appendChild(w);
}

function logout(){
  localStorage.removeItem('user');
  location.reload();
}

</script>

</body>
</html>
