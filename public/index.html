<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jay OS Links v4 (Stable + Windows Launchpad)</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  min-height:100vh;
  background:#0a0a0a;
  color:#fff;
  overflow:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 10%, rgba(100,160,110,0.18), transparent 60%),
    radial-gradient(circle at 80% 80%, rgba(80,130,90,0.12), transparent 55%);
  pointer-events:none;
}

.screen{
  display:none;
  min-height:100vh;
  align-items:center;
  justify-content:center;
  padding:2rem;
}
.screen.active{display:flex;}

.glass-card{
  width:360px;
  padding:26px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(22px);
}

.inp{
  width:100%;
  padding:11px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.05);
  color:#fff;
}

.btn{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:none;
  margin-top:8px;
  cursor:pointer;
}
.btn-primary{background:rgba(100,170,115,0.85);color:#fff;}
.btn-ghost{background:rgba(255,255,255,0.07);color:#ccc;}

/* OS */
#os-screen{
  display:none;
  height:100vh;
  flex-direction:column;
}
#os-screen.active{display:flex;}

.topbar{
  height:50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 14px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.launchpad{
  flex:1;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:12px;
}

.tile{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;
  padding:14px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}
.tile:hover{
  transform:translateY(-3px);
  background:rgba(100,170,115,0.2);
}

.tile-icon{font-size:22px;margin-bottom:6px;}
.tile-name{font-size:12px;opacity:0.8;}

/* WINDOW SYSTEM */
.window{
  position:absolute;
  width:460px;
  height:340px;
  background:rgba(20,20,20,0.8);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:12px;
  overflow:hidden;
  z-index:50;
}

.winbar{
  height:34px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
  background:rgba(255,255,255,0.06);
  cursor:grab;
}

iframe{
  width:100%;
  height:calc(100% - 34px);
  border:none;
}

.winbtns button{
  margin-left:6px;
  background:none;
  border:none;
  color:#fff;
  cursor:pointer;
}

/* ADMIN */
.admin-row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-bottom:6px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}
.del-btn{
  background:rgba(248,113,113,0.2);
  border:1px solid rgba(248,113,113,0.3);
  color:#f87171;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen" class="screen active">
  <div class="glass-card">
    <h2>Jay OS</h2>
    <button class="btn btn-primary" onclick="show('login-screen')">Login</button>
    <button class="btn btn-ghost" onclick="show('signup-screen')">Signup</button>
  </div>
</div>

<div id="login-screen" class="screen">
  <div class="glass-card">
    <input class="inp" id="login-user" placeholder="username" />
    <input class="inp" id="login-pass" type="password" placeholder="password" />
    <button class="btn btn-primary" onclick="doLogin()">Login</button>
    <button class="btn btn-ghost" onclick="show('auth-screen')">Back</button>
  </div>
</div>

<div id="signup-screen" class="screen">
  <div class="glass-card">
    <input class="inp" id="su-user" placeholder="username" />
    <input class="inp" id="su-pass" type="password" placeholder="invite password" />
    <button class="btn btn-primary" onclick="doSignup()">Signup</button>
    <button class="btn btn-ghost" onclick="show('auth-screen')">Back</button>
  </div>
</div>

<!-- OS -->
<div id="os-screen">
  <div class="topbar">
    <div>🖥 Jay OS v4</div>
    <div>
      <span id="user-chip"></span>
      <button onclick="doLogout()">Logout</button>
      <button onclick="openAdmin()">Admin</button>
    </div>
  </div>

  <div class="launchpad" id="grid"></div>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;align-items:center;justify-content:center;">
  <div class="glass-card">
    <input class="inp" id="admin-pass" type="password" placeholder="admin password" />
    <button class="btn btn-primary" onclick="checkAdmin()">Enter</button>
    <div id="admin-list"></div>
  </div>
</div>

<script>
let user=null;
let links=[];

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function doLogin(){
  const r=await fetch('/api/login',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:login_user.value,password:login_pass.value})
  });
  const d=await r.json();
  if(d.ok){
    user=d.username;
    openOS();
  }
}

async function doSignup(){
  const r=await fetch('/api/signup',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:su_user.value,password:su_pass.value})
  });
  const d=await r.json();
  if(d.ok){
    user=d.username;
    openOS();
  }
}

function openOS(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('os-screen').style.display='flex';
  document.getElementById('user-chip').innerText=user;
  loadLinks();
}

function doLogout(){location.reload();}

async function loadLinks(){
  const r=await fetch('/api/links');
  links=await r.json();
  render();
}

function render(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  links.forEach(l=>{
    const d=document.createElement('div');
    d.className='tile';
    d.innerHTML=`<div class='tile-icon'>${l.emoji}</div><div class='tile-name'>${l.name}</div>`;
    d.onclick=()=>openWin(l);
    g.appendChild(d);
  });
}

function openWin(app){
  const w=document.createElement('div');
  w.className='window';
  w.style.top='80px';
  w.style.left='80px';

  w.innerHTML=`
    <div class='winbar' onmousedown='drag(this.parentElement)'>
      <span>${app.name}</span>
      <div class='winbtns'>
        <button onclick="window.open('${app.url}','_blank')">↗</button>
        <button onclick="this.closest('.window').remove()">✕</button>
      </div>
    </div>
    <iframe src='${app.url}'></iframe>
  `;

  document.body.appendChild(w);
}

function openAdmin(){
  document.getElementById('admin').style.display='flex';
}

async function checkAdmin(){
  if(admin_pass.value==='messi2be'){
    const r=await fetch('/api/links');
    const d=await r.json();
    document.getElementById('admin-list').innerHTML=d.map(l=>
      `<div class='admin-row'>${l.name}<button class='del-btn' onclick="deleteLink(${l.id})">del</button></div>`
    ).join('');
  }
}

async function deleteLink(id){
  await fetch('/api/links/'+id,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminPassword:'messi2be'})});
  checkAdmin();
}

// drag
let dragEl=null;
function drag(el){dragEl=el;document.onmousemove=move;document.onmouseup=()=>dragEl=null;}
function move(e){if(!dragEl)return;dragEl.parentElement.style.left=e.clientX+'px';dragEl.parentElement.style.top=e.clientY+'px';}

</script>

</body>
</html>
